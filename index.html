<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Викторина | Создание своих викторин</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui; background: #0a0c15; min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        
        /* Режимы */
        .mode-selector { display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
        .mode-btn { background: #2a2e45; border: none; color: white; padding: 12px 28px; border-radius: 40px; cursor: pointer; font-size: 1rem; }
        .mode-btn.active { background: #2e7d32; }
        
        /* Панели */
        .panel { background: linear-gradient(145deg, #1a1f2e, #0f121c); border-radius: 48px; padding: 30px; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.1); }
        .panel-title { font-size: 1.5rem; font-weight: bold; margin-bottom: 20px; color: white; }
        
        /* Список викторин */
        .quiz-list { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; }
        .quiz-card { background: #2a2e45; border-radius: 24px; padding: 20px; cursor: pointer; flex: 1; min-width: 200px; transition: 0.1s; }
        .quiz-card:hover { background: #3a3e55; transform: scale(1.01); }
        .quiz-card h3 { margin-bottom: 8px; }
        .quiz-card p { color: #aaa; font-size: 0.8rem; }
        .delete-quiz { background: #b71c1c; border: none; color: white; padding: 5px 10px; border-radius: 20px; margin-top: 10px; cursor: pointer; font-size: 0.7rem; }
        
        /* Редактор вопросов */
        .question-editor { background: #00000030; border-radius: 32px; padding: 20px; margin-bottom: 20px; }
        .question-row { margin-bottom: 20px; padding: 15px; background: #1a1f2e; border-radius: 24px; }
        .question-row input, .question-row textarea { width: 100%; padding: 12px; margin-bottom: 10px; background: #2a2e45; border: none; border-radius: 20px; color: white; font-family: inherit; }
        .answers-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .answers-row input { margin-bottom: 0; }
        .correct-select { display: flex; gap: 15px; align-items: center; margin-top: 10px; }
        .correct-select label { display: flex; align-items: center; gap: 5px; color: #ddd; }
        .remove-question { background: #b71c1c; border: none; color: white; padding: 8px 16px; border-radius: 20px; cursor: pointer; margin-top: 10px; }
        
        /* Кнопки */
        .btn { background: #2a2e45; border: none; color: white; padding: 12px 28px; border-radius: 40px; cursor: pointer; font-size: 1rem; margin-right: 10px; margin-top: 10px; }
        .btn-primary { background: #2e7d32; }
        .btn-danger { background: #b71c1c; }
        .btn-warning { background: #ff9800; color: #1a1a2e; }
        
        /* Таблица лидеров */
        .scoreboard { background: #00000030; border-radius: 32px; padding: 20px; margin-bottom: 30px; }
        .scoreboard h2 { margin-bottom: 20px; color: white; }
        .score-row { display: flex; align-items: center; gap: 15px; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .team-color { width: 12px; height: 12px; border-radius: 12px; }
        .team-name { width: 100px; font-weight: bold; }
        .team-score { flex: 1; font-size: 1.5rem; font-weight: bold; }
        .score-buttons { display: flex; gap: 8px; }
        .score-btn { background: #2a2e45; border: none; color: white; width: 36px; height: 36px; border-radius: 20px; cursor: pointer; }
        
        /* Вопрос и ответы (игровой режим) */
        .question-text { font-size: 1.8rem; font-weight: 700; margin-bottom: 30px; color: white; }
        .answers { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .answer-btn { background: #2a2e45; border: none; color: white; font-size: 1.2rem; padding: 20px; border-radius: 40px; text-align: left; cursor: pointer; }
        .answer-btn.correct { background: #2e7d32; box-shadow: 0 0 15px #2e7d32; }
        .answer-btn.wrong { background: #b71c1c; }
        
        .question-list { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .q-btn { background: #2a2e45; border: none; color: white; padding: 10px 20px; border-radius: 30px; cursor: pointer; }
        .q-btn.active { background: #2e7d32; }
        
        .qr-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-top: 30px; padding-top: 30px; border-top: 2px dashed rgba(255,255,255,0.15); }
        .qr-card { background: #ffffff10; border-radius: 24px; padding: 15px; text-align: center; }
        .qr-card canvas { background: white; padding: 10px; border-radius: 16px; width: 120px; height: 120px; margin: 10px auto; }
        
        .status { background: #1a1f2e; border-radius: 20px; padding: 10px 20px; margin-bottom: 20px; display: inline-block; }
        .hidden { display: none; }
        
        @media (max-width: 768px) {
            .question-text { font-size: 1.2rem; }
            .answer-btn { font-size: 1rem; padding: 15px; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <!-- Режимы -->
    <div class="mode-selector">
        <button class="mode-btn" data-mode="play">🎮 ИГРАТЬ</button>
        <button class="mode-btn" data-mode="create">✏️ СОЗДАТЬ ВИКТОРИНУ</button>
        <button class="mode-btn" data-mode="edit">📋 МОИ ВИКТОРИНЫ</button>
    </div>
    
    <!-- ========== РЕЖИМ ИГРЫ ========== -->
    <div id="playMode" class="panel">
        <div class="status" id="statusDisplay">🟢 Готов к приёму ответов</div>
        
        <div class="question-text" id="questionText">Выберите викторину из списка</div>
        <div class="answers" id="answersPanel">
            <button class="answer-btn" data-answer="A">🅰️ А.</button>
            <button class="answer-btn" data-answer="B">🅱️ Б.</button>
            <button class="answer-btn" data-answer="C">🅲️ В.</button>
            <button class="answer-btn" data-answer="D">🅳️ Г.</button>
        </div>
        
        <div class="question-list" id="quizSelectList"></div>
        <div class="question-list" id="questionList"></div>
        
        <div class="control-panel">
            <button class="btn btn-primary" id="nextQuestionBtn">➡️ СЛЕДУЮЩИЙ ВОПРОС</button>
            <button class="btn" id="resetAnswersBtn">🔄 СБРОС ОТВЕТОВ</button>
            <button class="btn btn-danger" id="resetScoresBtn">🔴 СБРОС ОЧКОВ</button>
        </div>
        
        <div class="scoreboard">
            <h2>🏆 ТАБЛИЦА ЛИДЕРОВ</h2>
            <div id="scoreboardList"></div>
        </div>
        
        <div class="qr-grid" id="qrGrid"></div>
    </div>
    
    <!-- ========== РЕЖИМ СОЗДАНИЯ ВИКТОРИНЫ ========== -->
    <div id="createMode" class="panel hidden">
        <div class="panel-title">✏️ СОЗДАНИЕ НОВОЙ ВИКТОРИНЫ</div>
        <input type="text" id="quizName" placeholder="Название викторины (например: 'История', 'Музыка', 'Спорт')" style="width: 100%; padding: 15px; background: #2a2e45; border: none; border-radius: 30px; color: white; margin-bottom: 20px;">
        
        <div id="questionsEditor"></div>
        
        <button class="btn" id="addQuestionBtn">➕ ДОБАВИТЬ ВОПРОС</button>
        <button class="btn btn-primary" id="saveQuizBtn">💾 СОХРАНИТЬ ВИКТОРИНУ</button>
    </div>
    
    <!-- ========== РЕЖИМ МОИХ ВИКТОРИН ========== -->
    <div id="editMode" class="panel hidden">
        <div class="panel-title">📋 МОИ ВИКТОРИНЫ</div>
        <div id="savedQuizzesList"></div>
    </div>
</div>

<script>
    // ========== КОМАНДЫ ==========
    const TEAMS = [
        { id: 'team1', name: '🔴 КОМАНДА 1', color: '#ff4444', score: 0 },
        { id: 'team2', name: '🔵 КОМАНДА 2', color: '#4488ff', score: 0 },
        { id: 'team3', name: '🟢 КОМАНДА 3', color: '#44ff44', score: 0 },
        { id: 'team4', name: '🟡 КОМАНДА 4', color: '#ffdd44', score: 0 },
        { id: 'team5', name: '🟣 КОМАНДА 5', color: '#ff44ff', score: 0 },
        { id: 'team6', name: '🟠 КОМАНДА 6', color: '#ff8844', score: 0 }
    ];
    
    // ========== РАБОТА С LOCALSTORAGE ==========
    let allQuizzes = [];
    
    function loadQuizzes() {
        const saved = localStorage.getItem('quizzes');
        if (saved) {
            allQuizzes = JSON.parse(saved);
        } else {
            // Викторина по умолчанию
            allQuizzes = [{
                id: Date.now(),
                name: "Пример викторины",
                questions: [
                    { text: "Сколько планет в Солнечной системе?", answers: ["7", "8", "9", "10"], correct: "B" },
                    { text: "Какой язык программирования используется для создания этого сайта?", answers: ["Python", "Java", "JavaScript", "C++"], correct: "C" },
                    { text: "Кто написал 'Войну и мир'?", answers: ["Достоевский", "Толстой", "Чехов", "Пушкин"], correct: "B" }
                ]
            }];
            saveQuizzes();
        }
    }
    
    function saveQuizzes() {
        localStorage.setItem('quizzes', JSON.stringify(allQuizzes));
    }
    
    // ========== ПЕРЕМЕННЫЕ ИГРЫ ==========
    let currentQuiz = null;
    let currentQuestionIndex = 0;
    let currentQuestion = null;
    let waitingForAnswer = true;
    let currentLocked = false;
    
    // ========== FIREBASE ==========
    const firebaseConfig = { databaseURL: "https://knopka-e92fb-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const answersRef = database.ref('/quiz_answers');
    const teamsScoreRef = database.ref('/quiz_scores');
    const gameStateRef = database.ref('/quiz_state');
    const resetRoundRef = database.ref('/quiz_reset');
    
    // ========== ДОМ ЭЛЕМЕНТЫ ==========
    const playMode = document.getElementById('playMode');
    const createMode = document.getElementById('createMode');
    const editMode = document.getElementById('editMode');
    const modeBtns = document.querySelectorAll('.mode-btn');
    const questionTextEl = document.getElementById('questionText');
    const answersPanel = document.getElementById('answersPanel');
    const statusDisplay = document.getElementById('statusDisplay');
    const nextQuestionBtn = document.getElementById('nextQuestionBtn');
    const resetAnswersBtn = document.getElementById('resetAnswersBtn');
    const resetScoresBtn = document.getElementById('resetScoresBtn');
    const scoreboardList = document.getElementById('scoreboardList');
    const qrGrid = document.getElementById('qrGrid');
    const quizSelectList = document.getElementById('quizSelectList');
    const questionListDiv = document.getElementById('questionList');
    const questionsEditor = document.getElementById('questionsEditor');
    const quizNameInput = document.getElementById('quizName');
    const addQuestionBtn = document.getElementById('addQuestionBtn');
    const saveQuizBtn = document.getElementById('saveQuizBtn');
    const savedQuizzesList = document.getElementById('savedQuizzesList');
    
    // ========== РЕЖИМЫ ==========
    modeBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            modeBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const mode = btn.dataset.mode;
            playMode.classList.add('hidden');
            createMode.classList.add('hidden');
            editMode.classList.add('hidden');
            if (mode === 'play') playMode.classList.remove('hidden');
            if (mode === 'create') createMode.classList.remove('hidden');
            if (mode === 'edit') { editMode.classList.remove('hidden'); displaySavedQuizzes(); }
        });
    });
    
    // ========== РЕДАКТОР ВОПРОСОВ ==========
    let editingQuestions = [];
    
    function renderEditor() {
        questionsEditor.innerHTML = '';
        editingQuestions.forEach((q, idx) => {
            const div = document.createElement('div');
            div.className = 'question-row';
            div.innerHTML = `
                <input type="text" placeholder="Вопрос ${idx+1}" value="${escapeHtml(q.text)}" data-index="${idx}" data-field="text">
                <div class="answers-row">
                    <input type="text" placeholder="Вариант А" value="${escapeHtml(q.answers[0])}" data-index="${idx}" data-answer="0">
                    <input type="text" placeholder="Вариант Б" value="${escapeHtml(q.answers[1])}" data-index="${idx}" data-answer="1">
                    <input type="text" placeholder="Вариант В" value="${escapeHtml(q.answers[2])}" data-index="${idx}" data-answer="2">
                    <input type="text" placeholder="Вариант Г" value="${escapeHtml(q.answers[3])}" data-index="${idx}" data-answer="3">
                </div>
                <div class="correct-select">
                    <span>Правильный ответ:</span>
                    <label><input type="radio" name="correct_${idx}" value="A" ${q.correct === 'A' ? 'checked' : ''}> А</label>
                    <label><input type="radio" name="correct_${idx}" value="B" ${q.correct === 'B' ? 'checked' : ''}> Б</label>
                    <label><input type="radio" name="correct_${idx}" value="C" ${q.correct === 'C' ? 'checked' : ''}> В</label>
                    <label><input type="radio"name="correct_${idx}" value="D" ${q.correct === 'D' ? 'checked' : ''}> Г</label>
                </div>
                <button class="remove-question" data-index="${idx}">🗑️ Удалить вопрос</button>
            `;
            questionsEditor.appendChild(div);
        });
        
        // Добавляем обработчики
        document.querySelectorAll('#questionsEditor input[type="text"]').forEach(inp => {
            inp.addEventListener('change', (e) => {
                const idx = parseInt(inp.dataset.index);
                if (inp.dataset.field === 'text') editingQuestions[idx].text = inp.value;
                if (inp.dataset.answer !== undefined) editingQuestions[idx].answers[parseInt(inp.dataset.answer)] = inp.value;
            });
        });
        document.querySelectorAll('#questionsEditor input[type="radio"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                const name = radio.name;
                const idx = parseInt(name.split('_')[1]);
                editingQuestions[idx].correct = radio.value;
            });
        });
        document.querySelectorAll('.remove-question').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.dataset.index);
                editingQuestions.splice(idx, 1);
                renderEditor();
            });
        });
    }
    
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m) { return {'&':'&amp;','<':'&lt;','>':'&gt;'}[m]; }); }
    
    addQuestionBtn.addEventListener('click', () => {
        editingQuestions.push({
            text: "Новый вопрос",
            answers: ["Вариант А", "Вариант Б", "Вариант В", "Вариант Г"],
            correct: "A"
        });
        renderEditor();
    });
    
    saveQuizBtn.addEventListener('click', () => {
        const name = quizNameInput.value.trim();
        if (!name) { alert('Введите название викторины'); return; }
        if (editingQuestions.length === 0) { alert('Добавьте хотя бы один вопрос'); return; }
        
        const newQuiz = {
            id: Date.now(),
            name: name,
            questions: editingQuestions.map(q => ({ ...q }))
        };
        allQuizzes.push(newQuiz);
        saveQuizzes();
        alert(`Викторина "${name}" сохранена!`);
        editingQuestions = [];
        quizNameInput.value = '';
        renderEditor();
        displaySavedQuizzes();
    });
    
    function displaySavedQuizzes() {
        savedQuizzesList.innerHTML = '';
        allQuizzes.forEach((quiz, idx) => {
            const card = document.createElement('div');
            card.className = 'quiz-card';
            card.innerHTML = `
                <h3>${escapeHtml(quiz.name)}</h3>
                <p>${quiz.questions.length} вопросов</p>
                <button class="delete-quiz" data-id="${quiz.id}">🗑️ Удалить</button>
            `;
            savedQuizzesList.appendChild(card);
        });
        document.querySelectorAll('.delete-quiz').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = parseInt(btn.dataset.id);
                allQuizzes = allQuizzes.filter(q => q.id !== id);
                saveQuizzes();
                displaySavedQuizzes();
                displayQuizList();
            });
        });
    }
    
    // ========== ВЫБОР ВИКТОРИНЫ ДЛЯ ИГРЫ ==========
    function displayQuizList() {
        quizSelectList.innerHTML = '';
        allQuizzes.forEach(quiz => {
            const btn = document.createElement('button');
            btn.className = 'q-btn';
            btn.textContent = quiz.name;
            btn.onclick = () => {
                currentQuiz = quiz;
                currentQuestionIndex = 0;
                loadQuestion(0);
                displayQuestionNumbers();
            };
            quizSelectList.appendChild(btn);
        });
        if (allQuizzes.length === 0) {
            quizSelectList.innerHTML = '<div style="color: #aaa;">Нет викторин. Создайте новую в режиме "СОЗДАТЬ ВИКТОРИНУ"</div>';
        }
    }
    
    function displayQuestionNumbers() {
        if (!currentQuiz) return;
        questionListDiv.innerHTML = '';
        currentQuiz.questions.forEach((_, idx) => {
            const btn = document.createElement('button');
            btn.className = 'q-btn';
            if (idx === currentQuestionIndex) btn.classList.add('active');
            btn.textContent = `Вопрос ${idx + 1}`;
            btn.onclick = () => {
                if (confirm('Перейти к этому вопросу?')) loadQuestion(idx);
            };
            questionListDiv.appendChild(btn);
        });
    }
    
    function loadQuestion(index) {
        if (!currentQuiz) return;
        currentQuestionIndex = index;
        currentQuestion = { ...currentQuiz.questions[index] };
        waitingForAnswer = true;
        currentLocked = false;
        
        questionTextEl.textContent = currentQuestion.text;
        const btns = answersPanel.querySelectorAll('.answer-btn');
        btns.forEach((btn, idx) => {
            const letter = ['A', 'B', 'C', 'D'][idx];
            btn.innerHTML = `${letter === 'A' ? '🅰️' : letter === 'B' ? '🅱️' : letter === 'C' ? '🅲️' : '🅳️'} ${letter}. ${currentQuestion.answers[idx]}`;
            btn.classList.remove('correct', 'wrong');
        });
        
        displayQuestionNumbers();
        gameStateRef.set({
            question: currentQuestion.text,
            answers: currentQuestion.answers,
            correct: currentQuestion.correct
        });
        statusDisplay.innerHTML = '🟢 Готов к приёму ответов';
        statusDisplay.style.background = '#1a1f2e';
        answersRef.set({ locked: false, winner: null, answer: null });
        resetRoundRef.set(true);
    }
    
    // ========== ТАБЛИЦА ЛИДЕРОВ ==========
    function updateScoreboard() {
        const sorted = [...TEAMS].sort((a, b) => b.score - a.score);
        scoreboardList.innerHTML = sorted.map(team => `
            <div class="score-row">
                <div class="team-color" style="background: ${team.color}"></div>
                <div class="team-name">${team.name}</div>
                <div class="team-score">${team.score} очков</div>
                <div class="score-buttons">
                    <button class="score-btn" data-team="${team.id}" data-delta="1">+1</button>
                    <button class="score-btn" data-team="${team.id}" data-delta="-1">-1</button>
                </div>
            </div>
        `).join('');
        
        document.querySelectorAll('.score-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const teamId = btn.dataset.team;
                const delta = parseInt(btn.dataset.delta);
                const team = TEAMS.find(t => t.id === teamId);
                if (team) {
                    team.score = Math.max(0, team.score + delta);
                    updateScoreboard();
                    saveScoresToFirebase();
                }
            });
        });
    }
    
    function saveScoresToFirebase() {
        const scores = {};
        TEAMS.forEach(team => { scores[team.id] = team.score; });
        teamsScoreRef.set(scores);
    }
    
    function loadScoresFromFirebase() {
        teamsScoreRef.once('value').then(snapshot => {
            const scores = snapshot.val();
            if (scores) {
                TEAMS.forEach(team => { if (scores[team.id] !== undefined) team.score = scores[team.id]; });
                updateScoreboard();
            }
        });
    }
    
    // ========== ОБРАБОТКА ОТВЕТОВ ==========
    function resetRound() {
        waitingForAnswer = true;
        currentLocked = false;
        statusDisplay.innerHTML = '🟢 Готов к приёму ответов';
        statusDisplay.style.background = '#1a1f2e';
        const btns = answersPanel.querySelectorAll('.answer-btn');
        btns.forEach(btn => btn.classList.remove('correct', 'wrong'));
        answersRef.set({ locked: false, winner: null, answer: null });
        resetRoundRef.set(true);
    }
    
    answersRef.on('value', (snapshot) => {
        const data = snapshot.val();
        if (!data || !data.winner || !data.answer) return;
        if (!waitingForAnswer || currentLocked || !currentQuestion) return;
        
        const teamId = data.winner;
        const answer = data.answer;
        const team = TEAMS.find(t => t.id === teamId);
        
        if (team) {
            currentLocked = true;
            const isCorrect = (answer === currentQuestion.correct);
            
            if (isCorrect) {
                team.score += 1;
                saveScoresToFirebase();
                updateScoreboard();
                statusDisplay.innerHTML = `🏆 ${team.name} ответил(а) ПРАВИЛЬНО! +1 очко`;
                statusDisplay.style.background = '#2e7d32';
                const btns = answersPanel.querySelectorAll('.answer-btn');
                btns.forEach(btn => { if (btn.dataset.answer === currentQuestion.correct) btn.classList.add('correct'); });
            } else {
                statusDisplay.innerHTML = `❌ ${team.name} ответил(а) НЕПРАВИЛЬНО! Правильный ответ: ${currentQuestion.correct}. ${currentQuestion.answers[['A','B','C','D'].indexOf(currentQuestion.correct)]}`;
                statusDisplay.style.background = '#b71c1c';
                const btns = answersPanel.querySelectorAll('.answer-btn');
                btns.forEach(btn => {
                    if (btn.dataset.answer === currentQuestion.correct) btn.classList.add('correct');
                    if (btn.dataset.answer === answer && answer !== currentQuestion.correct) btn.classList.add('wrong');
                });
            }
            waitingForAnswer = false;
        }
    });
    
    // ========== КНОПКИ ==========
    nextQuestionBtn.addEventListener('click', () => {
        if (!currentQuiz) { alert('Сначала выберите викторину из списка'); return; }
        if (currentQuestionIndex + 1 < currentQuiz.questions.length) {
            loadQuestion(currentQuestionIndex + 1);
        } else {
            alert('🎉 Это был последний вопрос! Выберите другую викторину или создайте новую.');
        }
    });
    
    resetAnswersBtn.addEventListener('click', () => { resetRound(); });
    resetScoresBtn.addEventListener('click', () => {
        if (confirm('Сбросить очки всех команд?')) {
            TEAMS.forEach(team => { team.score = 0; });
            updateScoreboard();
            saveScoresToFirebase();
        }
    });
    
    // ========== QR-КОДЫ ==========
    function generateQRs() {
        const baseUrl = window.location.href.split('?')[0].split('#')[0];
        const cleanBase = baseUrl.endsWith('index.html') ? baseUrl.replace('index.html', '') : baseUrl;
        TEAMS.forEach(team => {
            const teamUrl = `${cleanBase}?team=${team.id}`;
            const qrDiv = document.createElement('div');
            qrDiv.className = 'qr-card';
            qrDiv.innerHTML = `<div class="team-title" style="color: ${team.color}">${team.name}</div><div id="qr_${team.id}"></div>`;
            qrGrid.appendChild(qrDiv);
            new QRCode(document.getElementById(`qr_${team.id}`), { text: teamUrl, width: 120, height: 120 });
        });
    }
    
    // ========== ТЕЛЕФОННЫЙ РЕЖИМ ==========
    const urlParams = new URLSearchParams(window.location.search);
    const teamParam = urlParams.get('team');
    
    if (teamParam && TEAMS.some(t => t.id === teamParam)) {
        const team = TEAMS.find(t => t.id === teamParam);
        document.body.innerHTML = '';
        document.body.style.background = '#0a0c15';
        document.body.style.display = 'flex';
        document.body.style.justifyContent = 'center';
        document.body.style.alignItems = 'center';
        document.body.style.minHeight = '100vh';
        document.body.style.padding = '20px';
        
        const container = document.createElement('div');
        container.style.maxWidth = '500px';
        container.style.width = '100%';
        container.style.background = 'linear-gradient(145deg, #1a1f2e, #0f121c)';
        container.style.borderRadius = '48px';
        container.style.padding = '30px';
        container.style.textAlign = 'center';
        
        const title = document.createElement('h1');
        title.innerText = team.name;
        title.style.color = team.color;
        title.style.fontSize = '2rem';
        title.style.marginBottom = '20px';
        
        const questionDisplay = document.createElement('div');
        questionDisplay.style.background = '#00000040';
        questionDisplay.style.borderRadius = '24px';
        questionDisplay.style.padding = '20px';
        questionDisplay.style.marginBottom = '30px';
        questionDisplay.style.fontSize = '1.2rem';
        questionDisplay.style.color = '#ddd';
        questionDisplay.id = 'phoneQuestion';
        questionDisplay.innerText = 'Выберите викторину на экране ведущего';
        
        const answersContainer = document.createElement('div');
        answersContainer.style.display = 'grid';
        answersContainer.style.gap = '12px';
        answersContainer.style.marginBottom = '20px';
        answersContainer.id = 'phoneAnswers';
        
        const statusMsg = document.createElement('div');
        statusMsg.style.marginTop = '20px';
        statusMsg.style.padding = '10px';
        statusMsg.style.borderRadius = '20px';
        statusMsg.style.fontSize = '0.9rem';
        statusMsg.id = 'phoneStatus';
        statusMsg.innerText = '🟢 Ожидание вопроса';
        
        container.appendChild(title);
        container.appendChild(questionDisplay);
        container.appendChild(answersContainer);
        container.appendChild(statusMsg);
        document.body.appendChild(container);
        
        let hasAnswered = false;
        
        gameStateRef.on('value', (snap) => {
            const data = snap.val();
            if (data && data.question) {
                questionDisplay.innerText = data.question;
                const btns = ['A', 'B', 'C', 'D'];
                answersContainer.innerHTML = '';
                btns.forEach(letter => {
                    const answerText = data.answers ? data.answers[['A','B','C','D'].indexOf(letter)] : letter;
                    const btn = document.createElement('button');
                    btn.innerText = `${letter === 'A' ? '🅰️' : letter === 'B' ? '🅱️' : letter === 'C' ? '🅲️' : '🅳️'} ${letter}. ${answerText}`;
                    btn.style.background = '#2a2e45';
                    btn.style.border = 'none';
                    btn.style.color = 'white';
                    btn.style.padding = '20px';
                    btn.style.borderRadius = '30px';
                    btn.style.fontSize = '1.2rem';
                    btn.style.cursor = 'pointer';
                    btn.style.margin = '5px';
                    btn.disabled = hasAnswered;
                    btn.onclick = () => sendAnswer(letter);
                    answersContainer.appendChild(btn);
                });
                hasAnswered = false;
                statusMsg.innerText = '🟢 Готов к ответу';
            }
        });
        
        resetRoundRef.on('value', (snap) => {
            if (snap.val() === true) {
                hasAnswered = false;
                statusMsg.innerText = '🟢 Новый вопрос!';
            }
        });
        
        async function sendAnswer(answer) {
            if (hasAnswered) { statusMsg.innerText = '⏳ Вы уже ответили!'; return; }
            const stateSnap = await answersRef.once('value');
            const state = stateSnap.val();
            if (state && state.locked) { statusMsg.innerText = '❌ Кто-то уже ответил!'; return; }
            hasAnswered = true;
            statusMsg.innerText = '✅ Ответ отправлен!';
            answersRef.set({ winner: team.id, answer: answer, timestamp: Date.now(), locked: true });
        }
    }
    
    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    loadQuizzes();
    loadScoresFromFirebase();
    updateScoreboard();
    generateQRs();
    displayQuizList();
    modeBtns[0].click();
</script>
</body>
</html>
