<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Викторина | Прогресс команд</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui; background: #0a0c15; min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; position: relative; }
        
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 1.2rem;
            padding: 10px 18px;
            border-radius: 40px;
            cursor: pointer;
            z-index: 1000;
            font-family: inherit;
            transition: 0.2s;
        }
        .fullscreen-btn:hover { background: rgba(0,0,0,0.8); transform: scale(1.02); }
        
        .mode-selector { display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; margin-top: 10px; }
        .mode-btn { background: #2a2e45; border: none; color: white; padding: 12px 28px; border-radius: 40px; cursor: pointer; font-size: 1rem; }
        .mode-btn.active { background: #2e7d32; }
        .panel { background: linear-gradient(145deg, #1a1f2e, #0f121c); border-radius: 48px; padding: 30px; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.1); }
        .panel-title { font-size: 1.5rem; font-weight: bold; margin-bottom: 20px; color: white; }
        .quiz-list { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; }
        .quiz-card { background: #2a2e45; border-radius: 24px; padding: 20px; flex: 1; min-width: 200px; }
        .quiz-card h3 { color: white; margin-bottom: 8px; }
        .quiz-card p { color: #aaa; font-size: 0.8rem; }
        .quiz-actions { display: flex; gap: 10px; margin-top: 15px; }
        .edit-quiz-btn { background: #ff9800; border: none; color: #1a1a2e; padding: 8px 16px; border-radius: 25px; cursor: pointer; font-size: 0.9rem; }
        .delete-quiz-btn { background: #b71c1c; border: none; color: white; padding: 8px 16px; border-radius: 25px; cursor: pointer; font-size: 0.9rem; }
        .edit-quiz-btn:hover, .delete-quiz-btn:hover { opacity: 0.8; }
        .question-editor { background: #00000030; border-radius: 32px; padding: 20px; margin-bottom: 20px; max-height: 500px; overflow-y: auto; }
        .question-row { margin-bottom: 20px; padding: 15px; background: #1a1f2e; border-radius: 24px; }
        .question-row input, .question-row textarea { width: 100%; padding: 12px; margin-bottom: 10px; background: #2a2e45; border: none; border-radius: 20px; color: white; font-family: inherit; }
        .answers-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .correct-select { display: flex; gap: 15px; align-items: center; margin-top: 10px; flex-wrap: wrap; color: #ddd; }
        .correct-select label { display: flex; align-items: center; gap: 5px; cursor: pointer; }
        .remove-question { background: #b71c1c; border: none; color: white; padding: 8px 16px; border-radius: 20px; cursor: pointer; margin-top: 10px; }
        .btn { background: #2a2e45; border: none; color: white; padding: 12px 28px; border-radius: 40px; cursor: pointer; font-size: 1rem; margin-right: 10px; margin-top: 10px; }
        .btn-primary { background: #2e7d32; }
        .btn-danger { background: #b71c1c; }
        .btn-warning { background: #ff9800; color: #1a1a2e; }
        .scoreboard { background: #00000030; border-radius: 32px; padding: 20px; margin-bottom: 30px; }
        .scoreboard h2 { margin-bottom: 20px; color: white; }
        .score-row { display: flex; align-items: center; gap: 15px; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .team-color { width: 12px; height: 12px; border-radius: 12px; }
        .team-name { width: 100px; font-weight: bold; color: white; }
        .team-score { flex: 1; font-size: 1.5rem; font-weight: bold; color: white; }
        .score-buttons { display: flex; gap: 8px; }
        .score-btn { background: #2a2e45; border: none; color: white; width: 36px; height: 36px; border-radius: 20px; cursor: pointer; font-size: 1.2rem; }
        
        /* Прогресс-бар */
        .progress-bar-container {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-top: -8px;
            margin-bottom: 15px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s ease;
        }
        .progress-bar.gold {
            background: linear-gradient(90deg, #ffd700, #ffb347);
            box-shadow: 0 0 6px #ffd700;
        }
        
        .question-text { font-size: 1.8rem; font-weight: 700; margin-bottom: 30px; color: white; }
        .answers { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .answer-btn { background: #2a2e45; border: none; color: white; font-size: 1.2rem; padding: 20px; border-radius: 40px; text-align: left; cursor: pointer; }
        .answer-btn.correct { background: #2e7d32; box-shadow: 0 0 15px #2e7d32; }
        .answer-btn.wrong { background: #b71c1c; }
        .question-list { display: flex; flex-wrap: wrap; gap: 10px; margin: 20px 0; }
        .q-btn { background: #2a2e45; border: none; color: white; padding: 10px 20px; border-radius: 30px; cursor: pointer; }
        .q-btn.active { background: #2e7d32; }
        .qr-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-top: 30px; padding-top: 30px; border-top: 2px dashed rgba(255,255,255,0.15); }
        .qr-card { background: #ffffff10; border-radius: 24px; padding: 15px; text-align: center; }
        .qr-card canvas { background: white; padding: 10px; border-radius: 16px; width: 120px; height: 120px; margin: 10px auto; }
        .status { background: #1a1f2e; border-radius: 20px; padding: 10px 20px; margin-bottom: 20px; display: inline-block; color: white; }
        .hidden { display: none; }
        
        @media (max-width: 768px) {
            .question-text { font-size: 1.2rem; }
            .answer-btn { font-size: 1rem; padding: 15px; }
            .team-name { width: 70px; font-size: 0.8rem; }
            .fullscreen-btn { padding: 6px 12px; font-size: 0.9rem; top: 10px; right: 10px; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <button class="fullscreen-btn" id="fullscreenBtn">⛶ На весь экран</button>
    
    <div class="mode-selector">
        <button class="mode-btn active" data-mode="play">🎮 ИГРАТЬ</button>
        <button class="mode-btn" data-mode="create">✏️ СОЗДАТЬ ВИКТОРИНУ</button>
        <button class="mode-btn" data-mode="edit">📋 МОИ ВИКТОРИНЫ</button>
    </div>
    
    <div id="playMode" class="panel">
        <div class="status" id="statusDisplay">🟢 Готов к приёму ответов</div>
        <div class="question-text" id="questionText">Выберите викторину из списка</div>
        <div class="answers" id="answersPanel">
            <button class="answer-btn" data-answer="A"></button>
            <button class="answer-btn" data-answer="B"></button>
            <button class="answer-btn" data-answer="C"></button>
            <button class="answer-btn" data-answer="D"></button>
        </div>
        <div class="question-list" id="quizSelectList"></div>
        <div class="question-list" id="questionList"></div>
        <div>
            <button class="btn btn-primary" id="nextQuestionBtn">➡️ СЛЕДУЮЩИЙ ВОПРОС</button>
            <button class="btn" id="resetAnswersBtn">🔄 СБРОС ОТВЕТОВ</button>
            <button class="btn btn-danger" id="resetScoresBtn">🔴 СБРОС ОЧКОВ</button>
        </div>
        <div class="scoreboard">
            <h2>🏆 ТАБЛИЦА ЛИДЕРОВ</h2>
            <div id="scoreboardList"></div>
        </div>
        <div class="qr-grid" id="qrGrid"></div>
    </div>
    
    <div id="createMode" class="panel hidden">
        <div class="panel-title" id="editorTitle">✏️ СОЗДАНИЕ НОВОЙ ВИКТОРИНЫ</div>
        <input type="text" id="quizName" placeholder="Название викторины" style="width: 100%; padding: 15px; background: #2a2e45; border: none; border-radius: 30px; color: white; margin-bottom: 20px;">
        <input type="hidden" id="editQuizId" value="">
        <div id="questionsEditor"></div>
        <button class="btn" id="addQuestionBtn">➕ ДОБАВИТЬ ВОПРОС</button>
        <button class="btn btn-primary" id="saveQuizBtn">💾 СОХРАНИТЬ ВИКТОРИНУ</button>
        <button class="btn btn-warning" id="cancelEditBtn" style="display: none;">❌ ОТМЕНИТЬ</button>
    </div>
    
    <div id="editMode" class="panel hidden">
        <div class="panel-title">📋 МОИ ВИКТОРИНЫ</div>
        <div id="savedQuizzesList"></div>
    </div>
</div>

<script>
    // ========== ПОЛНОЭКРАННЫЙ РЕЖИМ ==========
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    fullscreenBtn.addEventListener('click', () => {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    });
    document.addEventListener('fullscreenchange', () => {
        fullscreenBtn.textContent = document.fullscreenElement ? '✖ Выйти' : '⛶ На весь экран';
    });
    
    // ========== КОМАНДЫ ==========
    const TEAMS = [
        { id: 'team1', name: '🔴 КОМАНДА 1', color: '#ff4444', score: 0 },
        { id: 'team2', name: '🔵 КОМАНДА 2', color: '#4488ff', score: 0 },
        { id: 'team3', name: '🟢 КОМАНДА 3', color: '#44ff44', score: 0 },
        { id: 'team4', name: '🟡 КОМАНДА 4', color: '#ffdd44', score: 0 },
        { id: 'team5', name: '🟣 КОМАНДА 5', color: '#ff44ff', score: 0 },
        { id: 'team6', name: '🟠 КОМАНДА 6', color: '#ff8844', score: 0 }
    ];
    
    let allQuizzes = [];
    let editingQuizId = null;
    let editingQuestions = [];
    let currentQuiz = null;
    let currentQuestionIndex = 0;
    let currentQuestion = null;
    let waitingForAnswer = true;
    let currentLocked = false;
    
    // Firebase
    const firebaseConfig = { databaseURL: "https://knopka-e92fb-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const answersRef = database.ref('/quiz_answers');
    const teamsScoreRef = database.ref('/quiz_scores');
    const gameStateRef = database.ref('/quiz_state');
    const resetRoundRef = database.ref('/quiz_reset');
    
    function loadQuizzes() {
        const saved = localStorage.getItem('quizzes');
        if (saved) { allQuizzes = JSON.parse(saved); }
        else {
            allQuizzes = [{
                id: Date.now(),
                name: "Пример",
                questions: [
                    { text: "Сколько планет в Солнечной системе?", answers: ["7", "8", "9", "10"], correct: "B" },
                    { text: "Какой язык программирования используется для этого сайта?", answers: ["Python", "Java", "JavaScript", "C++"], correct: "C" }
                ]
            }];
            saveQuizzes();
        }
    }
    function saveQuizzes() { localStorage.setItem('quizzes', JSON.stringify(allQuizzes)); }
    
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m) { return {'&':'&amp;','<':'&lt;','>':'&gt;'}[m]; }); }
    
    function renderEditor() {
        const container = document.getElementById('questionsEditor');
        container.innerHTML = '';
        editingQuestions.forEach((q, idx) => {
            const div = document.createElement('div');
            div.className = 'question-row';
            div.innerHTML = `
                <textarea rows="2" placeholder="Вопрос ${idx+1}" data-index="${idx}" data-field="text">${escapeHtml(q.text)}</textarea>
                <div class="answers-row">
                    <input type="text" placeholder="А" value="${escapeHtml(q.answers[0])}" data-index="${idx}" data-answer="0">
                    <input type="text" placeholder="Б" value="${escapeHtml(q.answers[1])}" data-index="${idx}" data-answer="1">
                    <input type="text" placeholder="В" value="${escapeHtml(q.answers[2])}" data-index="${idx}" data-answer="2">
                    <input type="text" placeholder="Г" value="${escapeHtml(q.answers[3])}" data-index="${idx}" data-answer="3">
                </div>
                <div class="correct-select">
                    <span>Правильный ответ:</span>
                    <label><input type="radio" name="correct_${idx}" value="A" ${q.correct === 'A' ? 'checked' : ''}> А</label>
                    <label><input type="radio" name="correct_${idx}" value="B" ${q.correct === 'B' ? 'checked' : ''}> Б</label>
                    <label><input type="radio" name="correct_${idx}" value="C" ${q.correct === 'C' ? 'checked' : ''}> В</label>
                    <label><input type="radio" name="correct_${idx}" value="D" ${q.correct === 'D' ? 'checked' : ''}> Г</label>
                </div>
                <button class="remove-question" data-index="${idx}">🗑️ Удалить вопрос</button>
            `;
            container.appendChild(div);
        });
        
        document.querySelectorAll('#questionsEditor textarea, #questionsEditor input[type="text"]').forEach(inp => {
            inp.addEventListener('change', (e) => {
                const idx = parseInt(inp.dataset.index);
                if (inp.dataset.field === 'text') editingQuestions[idx].text = inp.value;
                if (inp.dataset.answer !== undefined) editingQuestions[idx].answers[parseInt(inp.dataset.answer)] = inp.value;
            });
        });
        document.querySelectorAll('#questionsEditor input[type="radio"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                const name = radio.name;
                const idx = parseInt(name.split('_')[1]);
                editingQuestions[idx].correct = radio.value;
            });
        });
        document.querySelectorAll('.remove-question').forEach(btn => {
            btn.addEventListener('click', () => {
                editingQuestions.splice(parseInt(btn.dataset.index), 1);
                renderEditor();
            });
        });
    }
    
    function startNewQuiz() {
        editingQuizId = null;
        document.getElementById('editQuizId').value = '';
        document.getElementById('quizName').value = '';
        document.getElementById('editorTitle').innerText = '✏️ СОЗДАНИЕ НОВОЙ ВИКТОРИНЫ';
        document.getElementById('cancelEditBtn').style.display = 'none';
        editingQuestions = [];
        renderEditor();
    }
    
    function editQuiz(quiz) {
        editingQuizId = quiz.id;
        document.getElementById('editQuizId').value = quiz.id;
        document.getElementById('quizName').value = quiz.name;
        document.getElementById('editorTitle').innerHTML = '✏️ РЕДАКТИРОВАНИЕ: ' + escapeHtml(quiz.name);
        document.getElementById('cancelEditBtn').style.display = 'inline-block';
        editingQuestions = JSON.parse(JSON.stringify(quiz.questions));
        renderEditor();
        
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.querySelector('[data-mode="create"]').classList.add('active');
        document.getElementById('playMode').classList.add('hidden');
        document.getElementById('createMode').classList.remove('hidden');
        document.getElementById('editMode').classList.add('hidden');
    }
    
    document.getElementById('addQuestionBtn').onclick = () => {
        editingQuestions.push({ text: "Новый вопрос", answers: ["", "", "", ""], correct: "A" });
        renderEditor();
    };
    
    document.getElementById('saveQuizBtn').onclick = () => {
        const name = document.getElementById('quizName').value.trim();
        if (!name) { alert('Введите название викторины'); return; }
        if (editingQuestions.length === 0) { alert('Добавьте хотя бы один вопрос'); return; }
        
        if (editingQuizId) {
            const idx = allQuizzes.findIndex(q => q.id === editingQuizId);
            if (idx !== -1) {
                allQuizzes[idx] = { id: editingQuizId, name: name, questions: editingQuestions.map(q => ({...q})) };
                alert(`Викторина "${name}" обновлена!`);
            }
        } else {
            allQuizzes.push({ id: Date.now(), name: name, questions: editingQuestions.map(q => ({...q})) });
            alert(`Викторина "${name}" сохранена!`);
        }
        saveQuizzes();
        startNewQuiz();
        displaySavedQuizzes();
        displayQuizList();
    };
    
    document.getElementById('cancelEditBtn').onclick = startNewQuiz;
    
    function displaySavedQuizzes() {
        const container = document.getElementById('savedQuizzesList');
        container.innerHTML = '';
        if (allQuizzes.length === 0) { 
            container.innerHTML = '<div style="color: #aaa;">Нет викторин. Создайте новую.</div>'; 
            return; 
        }
        allQuizzes.forEach(quiz => {
            const card = document.createElement('div');
            card.className = 'quiz-card';
            card.innerHTML = `
                <h3>${escapeHtml(quiz.name)}</h3>
                <p>${quiz.questions.length} вопросов</p>
                <div class="quiz-actions">
                    <button class="edit-quiz-btn" data-id="${quiz.id}">✏️ Редактировать</button>
                    <button class="delete-quiz-btn" data-id="${quiz.id}">🗑️ Удалить</button>
                </div>
            `;
            container.appendChild(card);
        });
        document.querySelectorAll('.edit-quiz-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = parseInt(btn.getAttribute('data-id'));
                const quiz = allQuizzes.find(q => q.id === id);
                if (quiz) editQuiz(quiz);
            });
        });
        document.querySelectorAll('.delete-quiz-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = parseInt(btn.getAttribute('data-id'));
                if (confirm('Удалить викторину?')) {
                    allQuizzes = allQuizzes.filter(q => q.id !== id);
                    saveQuizzes();
                    displaySavedQuizzes();
                    displayQuizList();
                    if (currentQuiz && currentQuiz.id === id) currentQuiz = null;
                }
            });
        });
    }
    
    function displayQuizList() {
        const container = document.getElementById('quizSelectList');
        container.innerHTML = '';
        if (allQuizzes.length === 0) { 
            container.innerHTML = '<div style="color: #aaa;">Нет викторин. Создайте новую.</div>'; 
            return; 
        }
        allQuizzes.forEach(quiz => {
            const btn = document.createElement('button');
            btn.className = 'q-btn';
            btn.textContent = quiz.name;
            btn.onclick = () => {
                currentQuiz = JSON.parse(JSON.stringify(quiz));
                currentQuestionIndex = 0;
                loadQuestion(0);
            };
            container.appendChild(btn);
        });
    }
    
    function displayQuestionNumbers() {
        const container = document.getElementById('questionList');
        if (!container) return;
        container.innerHTML = '';
        if (!currentQuiz) return;
        currentQuiz.questions.forEach((_, idx) => {
            const btn = document.createElement('button');
            btn.className = 'q-btn';
            if (idx === currentQuestionIndex) btn.classList.add('active');
            btn.textContent = `Вопрос ${idx + 1}`;
            btn.onclick = () => { if (confirm('Перейти к этому вопросу?')) loadQuestion(idx); };
            container.appendChild(btn);
        });
    }
    
    function loadQuestion(index) {
        if (!currentQuiz) return;
        currentQuestionIndex = index;
        currentQuestion = { ...currentQuiz.questions[index] };
        waitingForAnswer = true;
        currentLocked = false;
        document.getElementById('questionText').innerHTML = currentQuestion.text;
        const btns = document.querySelectorAll('#answersPanel .answer-btn');
        const letters = ['A', 'B', 'C', 'D'];
        const emoji = { A: '🅰️', B: '🅱️', C: '🅲️', D: '🅳️' };
        btns.forEach((btn, idx) => {
            const letter = letters[idx];
            btn.innerHTML = `${emoji[letter]} ${letter}. ${currentQuestion.answers[idx]}`;
            btn.classList.remove('correct', 'wrong');
        });
        displayQuestionNumbers();
        gameStateRef.set({ question: currentQuestion.text, answers: currentQuestion.answers, correct: currentQuestion.correct });
        document.getElementById('statusDisplay').innerHTML = '🟢 Готов к приёму ответов';
        document.getElementById('statusDisplay').style.background = '#1a1f2e';
        answersRef.set({ locked: false, winner: null, answer: null });
        resetRoundRef.set(true);
    }
    
    // ========== ОБНОВЛЁННАЯ ТАБЛИЦА ЛИДЕРОВ С ПРОГРЕСС-БАРОМ ==========
    function updateScoreboard() {
        const sorted = [...TEAMS].sort((a, b) => b.score - a.score);
        const maxScore = Math.max(10, ...TEAMS.map(t => t.score));
        
        const container = document.getElementById('scoreboardList');
        container.innerHTML = sorted.map(team => {
            const percent = Math.min(100, (team.score / maxScore) * 100);
            const isGold = team.score >= 10;
            
            return `
                <div class="score-row">
                    <div class="team-color" style="background: ${team.color}; box-shadow: 0 0 8px ${team.color}"></div>
                    <div class="team-name">${team.name}</div>
                    <div class="team-score">${team.score} очков</div>
                    <div class="score-buttons">
                        <button class="score-btn" data-team="${team.id}" data-delta="1">+1</button>
                        <button class="score-btn" data-team="${team.id}" data-delta="-1">-1</button>
                    </div>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar${isGold ? ' gold' : ''}" style="width: ${percent}%; background: ${isGold ? '#ffd700' : team.color};"></div>
                </div>
            `;
        }).join('');
        
        document.querySelectorAll('.score-btn').forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation();
                const team = TEAMS.find(t => t.id === btn.dataset.team);
                if (team) {
                    team.score = Math.max(0, team.score + parseInt(btn.dataset.delta));
                    updateScoreboard();
                    const scores = {}; TEAMS.forEach(t => { scores[t.id] = t.score; });
                    teamsScoreRef.set(scores);
                }
            };
        });
    }
    
    function resetRound() {
        waitingForAnswer = true;
        currentLocked = false;
        document.getElementById('statusDisplay').innerHTML = '🟢 Готов к приёму ответов';
        document.getElementById('statusDisplay').style.background = '#1a1f2e';
        document.querySelectorAll('#answersPanel .answer-btn').forEach(btn => btn.classList.remove('correct', 'wrong'));
        answersRef.set({ locked: false, winner: null, answer: null });
        resetRoundRef.set(true);
    }
    
    answersRef.on('value', (snapshot) => {
        const data = snapshot.val();
        if (!data || !data.winner || !data.answer) return;
        if (!waitingForAnswer || currentLocked || !currentQuestion) return;
        const team = TEAMS.find(t => t.id === data.winner);
        if (!team) return;
        currentLocked = true;
        const isCorrect = (data.answer === currentQuestion.correct);
        if (isCorrect) {
            team.score++;
            updateScoreboard();
            const scores = {}; TEAMS.forEach(t => { scores[t.id] = t.score; });
            teamsScoreRef.set(scores);
            document.getElementById('statusDisplay').innerHTML = `🏆 ${team.name} ответил ПРАВИЛЬНО! +1 очко`;
            document.getElementById('statusDisplay').style.background = '#2e7d32';
            document.querySelectorAll('#answersPanel .answer-btn').forEach(btn => {
                if (btn.dataset.answer === currentQuestion.correct) btn.classList.add('correct');
            });
        } else {
            const correctAnswerText = currentQuestion.answers[['A','B','C','D'].indexOf(currentQuestion.correct)];
            document.getElementById('statusDisplay').innerHTML = `❌ ${team.name} ответил НЕПРАВИЛЬНО! Правильный ответ: ${currentQuestion.correct}. ${correctAnswerText}`;
            document.getElementById('statusDisplay').style.background = '#b71c1c';
            document.querySelectorAll('#answersPanel .answer-btn').forEach(btn => {
                if (btn.dataset.answer === currentQuestion.correct) btn.classList.add('correct');
                if (btn.dataset.answer === data.answer && data.answer !== currentQuestion.correct) btn.classList.add('wrong');
            });
        }
        waitingForAnswer = false;
    });
    
    document.getElementById('nextQuestionBtn').onclick = () => {
        if (!currentQuiz) { alert('Сначала выберите викторину из списка'); return; }
        if (currentQuestionIndex + 1 < currentQuiz.questions.length) loadQuestion(currentQuestionIndex + 1);
        else alert('🎉 Последний вопрос! Выберите другую викторину.');
    };
    document.getElementById('resetAnswersBtn').onclick = resetRound;
    document.getElementById('resetScoresBtn').onclick = () => {
        if (confirm('Сбросить очки всех команд?')) {
            TEAMS.forEach(t => t.score = 0);
            updateScoreboard();
            const scores = {}; TEAMS.forEach(t => { scores[t.id] = 0; });
            teamsScoreRef.set(scores);
        }
    };
    
    function generateQRs() {
        const baseUrl = window.location.href.split('?')[0].split('#')[0];
        const cleanBase = baseUrl.endsWith('index.html') ? baseUrl.replace('index.html', '') : baseUrl;
        const grid = document.getElementById('qrGrid');
        grid.innerHTML = '';
        TEAMS.forEach(team => {
            const teamUrl = `${cleanBase}?team=${team.id}`;
            const div = document.createElement('div');
            div.className = 'qr-card';
            div.innerHTML = `<div class="team-title" style="color: ${team.color}">${team.name}</div><div id="qr_${team.id}"></div>`;
            grid.appendChild(div);
            new QRCode(document.getElementById(`qr_${team.id}`), { text: teamUrl, width: 120, height: 120 });
        });
    }
    
    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('playMode').classList.add('hidden');
            document.getElementById('createMode').classList.add('hidden');
            document.getElementById('editMode').classList.add('hidden');
            if (btn.dataset.mode === 'play') { 
                document.getElementById('playMode').classList.remove('hidden'); 
                displayQuizList(); 
            }
            if (btn.dataset.mode === 'create') { 
                document.getElementById('createMode').classList.remove('hidden'); 
                startNewQuiz(); 
            }
            if (btn.dataset.mode === 'edit') { 
                document.getElementById('editMode').classList.remove('hidden'); 
                displaySavedQuizzes(); 
            }
        };
    });
    
    const teamParam = new URLSearchParams(window.location.search).get('team');
    if (teamParam && TEAMS.some(t => t.id === teamParam)) {
        const team = TEAMS.find(t => t.id === teamParam);
        document.body.innerHTML = '';
        document.body.style.background = '#0a0c15';
        document.body.style.display = 'flex';
        document.body.style.justifyContent = 'center';
        document.body.style.alignItems = 'center';
        document.body.style.minHeight = '100vh';
        document.body.style.padding = '20px';
        const container = document.createElement('div');
        container.style.maxWidth = '500px';
        container.style.width = '100%';
        container.style.background = 'linear-gradient(145deg, #1a1f2e, #0f121c)';
        container.style.borderRadius = '48px';
        container.style.padding = '30px';
        container.style.textAlign = 'center';
        const title = document.createElement('h1');
        title.innerText = team.name;
        title.style.color = team.color;
        title.style.fontSize = '2rem';
        title.style.marginBottom = '20px';
        const questionDisplay = document.createElement('div');
        questionDisplay.style.background = '#00000040';
        questionDisplay.style.borderRadius = '24px';
        questionDisplay.style.padding = '20px';
        questionDisplay.style.marginBottom = '30px';
        questionDisplay.style.fontSize = '1.2rem';
        questionDisplay.style.color = '#ddd';
        const answersContainer = document.createElement('div');
        answersContainer.style.display = 'grid';
        answersContainer.style.gap = '12px';
        answersContainer.style.marginBottom = '20px';
        const statusMsg = document.createElement('div');
        statusMsg.style.marginTop = '20px';
        statusMsg.style.padding = '10px';
        statusMsg.style.borderRadius = '20px';
        statusMsg.style.fontSize = '0.9rem';
        statusMsg.style.color = '#ddd';
        container.appendChild(title);
        container.appendChild(questionDisplay);
        container.appendChild(answersContainer);
        container.appendChild(statusMsg);
        document.body.appendChild(container);
        
        let hasAnswered = false;
        gameStateRef.on('value', (snap) => {
            const data = snap.val();
            if (data && data.question) {
                questionDisplay.innerText = data.question;
                answersContainer.innerHTML = '';
                const letters = ['A', 'B', 'C', 'D'];
                const emoji = { A: '🅰️', B: '🅱️', C: '🅲️', D: '🅳️' };
                letters.forEach(letter => {
                    const answerText = data.answers ? data.answers[letters.indexOf(letter)] : letter;
                    const btn = document.createElement('button');
                    btn.innerText = `${emoji[letter]} ${letter}. ${answerText}`;
                    btn.style.background = '#2a2e45';
                    btn.style.border = 'none';
                    btn.style.color = 'white';
                    btn.style.padding = '20px';
                    btn.style.borderRadius = '30px';
                    btn.style.fontSize = '1.2rem';
                    btn.style.cursor = 'pointer';
                    btn.style.margin = '5px';
                    btn.disabled = hasAnswered;
                    btn.onclick = () => sendAnswer(letter);
                    answersContainer.appendChild(btn);
                });
                hasAnswered = false;
                statusMsg.innerText = '🟢 Готов к ответу';
            }
        });
        resetRoundRef.on('value', (snap) => { if (snap.val() === true) { hasAnswered = false; statusMsg.innerText = '🟢 Новый вопрос!'; } });
        async function sendAnswer(answer) {
            if (hasAnswered) { statusMsg.innerText = '⏳ Вы уже ответили!'; return; }
            const state = (await answersRef.once('value')).val();
            if (state && state.locked) { statusMsg.innerText = '❌ Кто-то уже ответил!'; return; }
            hasAnswered = true;
            statusMsg.innerText = '✅ Ответ отправлен!';
            answersRef.set({ winner: team.id, answer: answer, timestamp: Date.now(), locked: true });
        }
    }
    
    loadQuizzes();
    teamsScoreRef.once('value').then(snap => {
        const scores = snap.val();
        if (scores) TEAMS.forEach(t => { if (scores[t.id] !== undefined) t.score = scores[t.id]; });
        updateScoreboard();
    });
    generateQRs();
    displayQuizList();
</script>
</body>
</html>
